useCases:
  - id: NFE_VENDA_SIMPLES_NACIONAL
    module: NFE
    name: NF-e de venda - Simples Nacional
    description: Exemplo de NF-e modelo 55 para venda interna de mercadoria por empresa do Simples Nacional, usando CSOSN.
    model: "55"
    layoutVersion: "4.00"
    outputs: [XML, JSON, README]
    tags: [nfe, venda, simples-nacional, csosn, onboarding]
    template:
      xml: templates/nfe/xml/nfe.ftl
      json: templates/nfe/json/nfe.ftl
      readme: templates/nfe/readme/nfe.md.ftl
    sampleData: samples/nfe/nfe-venda-simples-nacional.yml
    ruleSets:
      - rules/nfe/common.yml
      - rules/nfe/venda.yml
      - rules/nfe/simples-nacional.yml

